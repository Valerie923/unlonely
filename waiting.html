<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlonely</title>
    <link rel="stylesheet" href="style.css">   

</head>
<body>
    <header>
        <h1>You're a few seconds away from finding a friend!</h1>
    </header>

    <main>
        <div class="spinner"></div>
        <h2>Finding you someone to talk to...</h2>
        <p>Good things take a moment...</p>
        <button id="aiChatBtn">Chat with AI while waiting</button>
        <div id="aiChatArea" style="display:none">
            <div id = "aiMessages"></div>
            <div style="display:flex; gap:10px; margin-top:10px;">
                <input type="text" id="aiInput" placeholder="Type something...">
                <button id="aiSendBtn">Send</button>
            </div>
        </div>
        
    </main>




    <script src="https://cdn.socket.io/4.8.0/socket.io.min.js"></script>
    <script src="waiting.js"></script>
</body>
