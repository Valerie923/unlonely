<!DOCTYPE html>
<html lang="en">
<head>

    <title>Unlonely</title>
    <link rel="stylesheet" href="style.css">   

</head>
<body>
    <header>
        <h1>You're a few seconds away from finding a friend!</h1>
    </header>

    <main>
        <div class="spinner"></div>
        <h2>Finding you someone to talk to...</h2>

        <a href="chat.html"><button>Begin Conversation (testing only)</button></a>

            <div id = "aiMessages"></div>
            <input type="text" id="aiInput" placeholder="Type something...">
            <button id = "aiSendBtn">Send</button>
        </div>
           
    </main>
